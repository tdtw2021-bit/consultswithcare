<!DOCTYPE html>
<html lang="en">
<head>

<style>
/* Credit line — bottom-right */
.design-ui-credit {
  position: fixed;
  bottom: 12px;
  right: 12px;
  font: 11px/1 system-ui, sans-serif;
  color: rgba(128,128,128,0.5);
  pointer-events: none;
  z-index: 2147483647;
  transition: opacity 0.4s ease;
  user-select: none;
  letter-spacing: 0.02em;
}

/* Hide chrome on touch devices */
@media (hover: none) {
  .design-ui-credit { display: none; }
}

/* Print fixes */
@media print {
  * {
    transition: none !important;
    animation: none !important;
    box-shadow: none !important;
  }
  body {
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .design-ui-credit { display: none !important; }
}

</style>
<script>
(function () {
    // Chrome UI (hover devices only): credit badge with idle-fade.
    // Deferred until body exists since the script may run in <head>.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initChromeUI);
    } else {
        initChromeUI();
    }
})();

</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Consults With Care</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --brand: oklch(45% 0.12 250);
    --brand-light: oklch(94% 0.02 250);
    --brand-dark: oklch(30% 0.08 250);
    --brand-mid: oklch(55% 0.10 250);
    --accent: oklch(62% 0.15 165);
    --accent-light: oklch(93% 0.03 165);
    --surface-1: oklch(98% 0.004 250);
    --surface-2: oklch(96% 0.006 250);
    --surface-3: oklch(99.5% 0.002 250);
    --text-primary: oklch(20% 0.015 250);
    --text-secondary: oklch(40% 0.012 250);
    --text-muted: oklch(58% 0.008 250);
    --bot-bubble: oklch(95.5% 0.015 250);
    --user-bubble: var(--brand);
    --border: oklch(91% 0.008 250);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  }

  html { font-size: 16px; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--surface-1);
    color: var(--text-primary);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    font-optical-sizing: auto;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--brand);
    color: white;
  }

  .header-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: oklch(55% 0.10 250);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 1rem;
    border: 2px solid oklch(65% 0.08 250);
  }

  .header-info { flex: 1; }

  .header-name {
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: -0.01em;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    opacity: 0.85;
    margin-top: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: oklch(78% 0.18 150);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .header-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: oklch(40% 0.08 250);
    color: white;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background 0.15s;
  }

  .header-close:hover { background: oklch(35% 0.08 250); }
  .header-close svg { width: 16px; height: 16px; }

  /* Chat Container */
  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  /* Welcome Card */
  .welcome-card {
    background: var(--brand-light);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    animation: message-in 0.5s var(--ease-out-expo) both;
  }

  .welcome-card p {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .welcome-card .brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .welcome-card .brand-badge svg { width: 14px; height: 14px; }

  .message {
    display: flex;
    gap: 10px;
    max-width: 88%;
    animation: message-in 0.4s var(--ease-out-expo) both;
  }

  .message.bot { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  @keyframes message-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    margin-top: 2px;
    font-size: 0.65rem;
    font-weight: 600;
  }

  .bot .avatar {
    background: var(--brand);
    color: white;
  }

  .user .avatar {
    background: var(--accent-light);
    color: oklch(35% 0.10 165);
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.875rem;
    line-height: 1.55;
    font-weight: 400;
  }

  .bot .bubble {
    background: var(--bot-bubble);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
  }

  .user .bubble {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .bubble p + p { margin-top: 6px; }

  /* Quick Replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-left: 38px;
    animation: message-in 0.4s var(--ease-out-expo) 0.15s both;
  }

  .quick-reply {
    padding: 7px 14px;
    border: 1.5px solid var(--border);
    border-radius: 18px;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--surface-3);
    cursor: pointer;
    transition: all 0.15s var(--ease-out-quart);
  }

  .quick-reply:hover {
    border-color: var(--brand);
    color: var(--brand);
    background: var(--brand-light);
    transform: translateY(-1px);
  }

  .quick-reply:active { transform: translateY(0); }

  /* Typing Indicator */
  .typing {
    display: flex;
    gap: 10px;
    align-self: flex-start;
    max-width: 88%;
    animation: message-in 0.3s var(--ease-out-expo) both;
  }

  .typing .bubble {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bot-bubble);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typing-bounce 1.4s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
    30% { transform: translateY(-3px); opacity: 1; }
  }

  /* Input Area */
  .input-area {
    padding: 12px 16px 16px;
    background: var(--surface-3);
    border-top: 1px solid var(--border);
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface-1);
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 4px 4px 4px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px oklch(45% 0.12 250 / 0.08);
  }

  .input-wrapper textarea {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 0.875rem;
    line-height: 1.5;
    resize: none;
    padding: 8px 0;
    max-height: 100px;
    color: var(--text-primary);
  }

  .input-wrapper textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--brand);
    color: white;
    cursor: pointer;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    transition: transform 0.15s var(--ease-out-quart), opacity 0.15s;
    opacity: 0.35;
  }

  .send-btn.active { opacity: 1; }
  .send-btn.active:hover { transform: scale(1.05); }
  .send-btn.active:active { transform: scale(0.95); }
  .send-btn svg { width: 16px; height: 16px; }

  /* Powered by */
  .powered {
    text-align: center;
    padding: 8px;
    font-size: 0.7rem;
    color: var(--text-muted);
    background: var(--surface-3);
  }

  /* Scrollbar */
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 480px) {
    .header { padding: 16px; }
    .messages { padding: 16px 12px 12px; gap: 12px; }
    .message { max-width: 92%; }
    .quick-replies { padding-left: 0; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-avatar">TW</div>
  <div class="header-info">
    <div class="header-name">Consults With Care</div>
    <div class="header-status">
      <span class="status-dot"></span>
      Typically replies instantly
    </div>
  </div>
</header>

<main class="chat-container">
  <div class="messages" id="messages">
    <div class="welcome-card">
      <div class="brand-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Consults With Care
      </div>
      <p>Administrative consulting for startups and growing businesses. Ask me anything about our services, or let's find out how I can help.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="userInput" rows="1" placeholder="Ask me anything..." aria-label="Message input"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</main>

<div class="powered">Powered by Consults With Care</div>

<script>
const messagesEl = document.getElementById('messages');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

const botPersonality = {
  greeting: {
    text: "Hey there! I'm so glad you're here. I'm Tasha's virtual assistant, and I'd love to help you figure out how Consults With Care can support your business. What's on your mind today?",
    quickReplies: ["What services do you offer?", "I need help getting organized", "I'm a startup founder", "I want to book a consultation"]
  },
  services: {
    text: "We offer a full suite of admin consulting services tailored to startups and growing businesses: office & calendar management, process improvement, data entry & records, HR & onboarding support, project coordination, virtual assistant services, and budget & expense tracking. Every engagement is personalized to where you are right now. What sounds most relevant to you?",
    quickReplies: ["Process improvement", "Virtual assistant", "Project coordination", "I need a bit of everything"]
  },
  organized: {
    text: "You're in the right place. Most of our clients come to us feeling overwhelmed by the operational side of things. Whether it's a messy calendar, no clear processes, or just too many balls in the air, Tasha helps you build systems that actually stick. What's causing the most friction right now?",
    quickReplies: ["My calendar is chaos", "No processes in place", "Onboarding new hires", "Just general overwhelm"]
  },
  startup: {
    text: "Love working with founders. Tasha gets the startup world: fast-paced, resource-conscious, always building. She helps you put structure in place without slowing you down. What stage are you at?",
    quickReplies: ["Just me, solo", "Small team (2-5)", "Growing fast (5+)", "Pre-launch"]
  },
  booking: {
    text: "Let's make it happen! Tasha offers a free 30-minute consultation to understand your business and see if it's a great fit. You can reach her directly at consultswithcare@gmail.com, or I can tell you more about what to expect on that call.",
    quickReplies: ["What happens on the call?", "I'll send an email", "What are your hours?"]
  },
  process: {
    text: "Process improvement is one of Tasha's superpowers. She'll look at your current workflows, identify bottlenecks and redundancies, then help you build streamlined systems that save real time. Most clients see results within the first week. Want to set up a call to talk specifics?",
    quickReplies: ["Yes, let's book", "What does it cost?", "Tell me more"]
  },
  va: {
    text: "Virtual assistant services cover the day-to-day: email management, research, scheduling, follow-ups, data entry. Basically anything that's eating up your time but doesn't need YOU specifically. It's flexible, remote, and reliable. Interested in learning more?",
    quickReplies: ["How does pricing work?", "Book a consultation", "What's the time commitment?"]
  },
  pricing: {
    text: "Great question. Pricing depends on the scope of what you need, since every engagement is custom. The best way to get a clear picture is through that free 30-minute consultation. No pressure, just a conversation about what you need and how Tasha can help. Sound good?",
    quickReplies: ["Let's book it", "I'll email Tasha", "One more question"]
  },
  hours: {
    text: "Tasha is available Monday through Friday, 9am to 5pm. She typically responds within 24 hours. For the free consultation, she's flexible on scheduling, just reach out at consultswithcare@gmail.com and she'll find a time that works.",
    quickReplies: ["I'll reach out!", "What should I include in my email?"]
  },
  email_tips: {
    text: "Just introduce yourself, share a little about your business, and mention what kind of support you're looking for. Don't overthink it! Tasha loves hearing about new businesses and will take it from there.",
    quickReplies: ["Thanks, I'll do that!", "Any other questions I should ask?"]
  },
  call_info: {
    text: "On the call, Tasha will ask about your business, what's working, what's not, and where you need the most support. She'll share some initial ideas and you'll both decide if it's a good fit. Zero pressure, just a real conversation.",
    quickReplies: ["Sounds great, let's book", "I'll email her"]
  },
  thanks: {
    text: "You're so welcome! Tasha is genuinely excited to help businesses run smoother. Don't hesitate to reach out anytime at consultswithcare@gmail.com. Wishing you and your business all the best!",
    quickReplies: ["Back to the start", "One more question"]
  },
  default: {
    text: "I appreciate you sharing that! Every business is different, and that's exactly why Tasha takes a personalized approach. The best next step would be a free 30-minute consultation where she can really dig into your situation. Would you like to set that up?",
    quickReplies: ["Yes please!", "Tell me more first", "What services do you offer?"]
  }
};

function getResponseKey(text) {
  const lower = text.toLowerCase();
  if (lower.includes('service') || lower.includes('offer') || lower.includes('what do you')) return 'services';
  if (lower.includes('organiz') || lower.includes('overwhelm') || lower.includes('chaos') || lower.includes('messy') || lower.includes('friction')) return 'organized';
  if (lower.includes('startup') || lower.includes('founder') || lower.includes('solo') || lower.includes('small team') || lower.includes('growing')) return 'startup';
  if (lower.includes('book') || lower.includes('consult') || lower.includes('call') || lower.includes('let\'s do') || lower.includes('yes please') || lower.includes('make it happen')) return 'booking';
  if (lower.includes('process') || lower.includes('workflow') || lower.includes('bottleneck') || lower.includes('streamline')) return 'process';
  if (lower.includes('virtual assistant') || lower.includes('va ') || lower.includes('email management') || lower.includes('remote support')) return 'va';
  if (lower.includes('cost') || lower.includes('price') || lower.includes('pricing') || lower.includes('how much') || lower.includes('rate')) return 'pricing';
  if (lower.includes('hour') || lower.includes('available') || lower.includes('when') || lower.includes('schedule') || lower.includes('mon')) return 'hours';
  if (lower.includes('email') || lower.includes('include') || lower.includes('reach out') || lower.includes('i\'ll send')) return 'email_tips';
  if (lower.includes('what happens') || lower.includes('on the call') || lower.includes('expect')) return 'call_info';
  if (lower.includes('thank') || lower.includes('thanks') || lower.includes('appreciate') || lower.includes('welcome') || lower.includes('i\'m good')) return 'thanks';
  if (lower.includes('back to') || lower.includes('start over')) return 'greeting';
  return 'default';
}

function createMessage(text, type) {
  const msg = document.createElement('div');
  msg.className = `message ${type}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = type === 'bot' ? 'TW' : 'You';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `<p>${text}</p>`;

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  return msg;
}

function createQuickReplies(replies) {
  const container = document.createElement('div');
  container.className = 'quick-replies';
  replies.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'quick-reply';
    btn.textContent = text;
    btn.addEventListener('click', () => handleUserMessage(text));
    container.appendChild(btn);
  });
  return container;
}

function createTypingIndicator() {
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = `
    <div class="avatar" style="font-size:0.65rem;font-weight:600;background:var(--brand);color:white;width:28px;height:28px;border-radius:50%;display:grid;place-items:center;">TW</div>
    <div class="bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  `;
  return typing;
}

function scrollToBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

function removeQuickReplies() {
  messagesEl.querySelectorAll('.quick-replies').forEach(el => el.remove());
}

function handleUserMessage(text) {
  removeQuickReplies();
  const userMsg = createMessage(text, 'user');
  messagesEl.appendChild(userMsg);
  scrollToBottom();

  const typing = createTypingIndicator();
  setTimeout(() => { messagesEl.appendChild(typing); scrollToBottom(); }, 250);

  const key = getResponseKey(text);
  const response = botPersonality[key];
  const delay = 1000 + Math.random() * 700;

  setTimeout(() => {
    typing.remove();
    const botMsg = createMessage(response.text, 'bot');
    messagesEl.appendChild(botMsg);
    if (response.quickReplies) {
      setTimeout(() => {
        messagesEl.appendChild(createQuickReplies(response.quickReplies));
        scrollToBottom();
      }, 150);
    }
    scrollToBottom();
  }, delay);

  input.value = '';
  input.style.height = 'auto';
  sendBtn.classList.remove('active');
}

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  sendBtn.classList.toggle('active', input.value.trim().length > 0);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (input.value.trim()) handleUserMessage(input.value.trim());
  }
});

sendBtn.addEventListener('click', () => {
  if (input.value.trim()) handleUserMessage(input.value.trim());
});

// Initial greeting
setTimeout(() => {
  const g = botPersonality.greeting;
  messagesEl.appendChild(createMessage(g.text, 'bot'));
  setTimeout(() => {
    messagesEl.appendChild(createQuickReplies(g.quickReplies));
    scrollToBottom();
  }, 250);
}, 500);
</script>

</body>
</html>
